<div id="error-banner" class="govuk-notification-banner govuk-notification-banner--error"
     role="region" aria-labelledby="govuk-notification-banner-title"
     data-module="govuk-notification-banner">
    <div class="govuk-notification-banner__header">
        <h2 class="govuk-notification-banner__title" id="govuk-notification-banner-title">
            Important
        </h2>
    </div>
    <div class="govuk-notification-banner__content">
        <p class="govuk-notification-banner__heading">
            {{ error_message.title }}
        </p>
        {% for paragraph in error_message.paragraphs %}
            <p class="govuk-body">
                {#Marking as safe here since it is coming from the action error messages and not any direct input#}
                {{ paragraph|safe }}
            </p>
        {% endfor %}
    </div>
</div>
